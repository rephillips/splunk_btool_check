[btoolcheck-command]
syntax = btoolcheck (conf=<conf-file>)? (app=<app-name>)?
simplesyntax = btoolcheck (conf=<conf-file>)? (app=<app-name>)?
shortdesc = Check Splunk .conf files for typos and invalid keys using btool check.
description = Runs "splunk btool check" to identify invalid keys and possible typos in configuration files. \
    Without arguments, checks ALL known conf files. \
    Use conf=<name> to check a specific conf file (e.g., conf=inputs). \
    Use app=<name> to scope to a specific app (note: btool --app may misreport inherited settings).
usage = public
example1 = | btoolcheck
comment1 = Check all configuration files for typos and invalid keys.
example2 = | btoolcheck conf=savedsearches
comment2 = Check only savedsearches.conf for issues.
example3 = | btoolcheck conf=props app=Splunk_TA_windows
comment3 = Check props.conf scoped to a specific app.
tags = btool check configuration typo invalid admin troubleshoot
